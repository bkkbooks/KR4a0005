body:
  text: 離騷草木疏楚詞類提要臣等謹案離騷草木疏四巻宋吳仁傑撰仁傑有古周易巳著錄是編末有仁傑慶元丁巳自序謂梁劉杳有草木疏二巻見於本傳其書巳亡杳疏凡王逸所集者皆在焉仁傑獨取二十五篇疏之其大㫖謂離騷之文多本山海經故書中引用每以山海經為斷若辨夕攬洲之宿莽句引朝歌之山有莽草焉為據駁王逸舊註之非其說甚辨然騷人寄興義不一端瓊枝若木之屬固有寓言澧蘭沅芷之類亦多即目必舉其隨時抒望觸物興懷悉引之於大荒之外使靈均所賦悉出伯益所書是澤畔行吟主於侈其博贍非以寫其哀怨是亦好奇之過矣然其徴引宏富考辨典核實能補王逸訓詁所未及以視陸璣之疏毛詩羅願之翼爾雅可以方軌並駕争騖後先故博物者恒資焉迹其賅洽固亦考證之林也此本為影宋舊鈔末有慶元庚申方燦䟦又有校正姓氏三行蓋仁傑官國子學録時屬燦刋於羅田者舊板散佚流傳頗罕寫本僅存亦可謂藝林之珍笈矣乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:256904b0c6cdff58232918adabac6554b413590fb8ccc21055978b2ea674fba3
