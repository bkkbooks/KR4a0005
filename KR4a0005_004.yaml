body:
  text: 離騷草木疏卷四宋吳仁傑撰薋薋菉葹以盈室兮王逸注三者皆惡草以喻讒佞盈滿於側薋蒺藜也詩楚楚者薋洪慶善曰今詩薋作茨爾雅亦作茨布地蔓生細葉子有三角薋音瓷仁傑按陸法言字書云薋蒺藜詩作茨説文又作薺本草蒺藜條云一名旁通一名屈人一名止行一名材羽一名升推一名即梨一名茨陶隱居云多生道上子有刺狀如蓤而小長安最饒人行多著木屐軍家鑄鐡作之以布散路易云據于蒺藜言其凶傷詩云牆有茨不可掃也以刺梗穢集韻薋津私切引博雅云苙􅀢薋一曰菜生水中按顧野王云薋菜生水中字從草從資陸法言亦作薋與集韻不同博雅謂苙為白芷按本草芷無名其葉名蒿宜誤以蒿為苙耶菉菉王逸注菉王芻也爾雅菉一名王芻郭璞云菉蓐也今呼鴟腳莎詩瞻彼淇澳菉竹猗猗仁傑按本草以為藎草云葉似竹而細葉薄莖亦圓小俗名菉蓐草葹葹王逸注枲耳也按爾雅卷耳一名苓耳亦云胡枲江東呼為常枲形似鼠耳叢生如盤陸璣詩疏云葉青白色似胡荽白華細莖蔓生四月中生子如婦人耳璫幽州人謂之爵耳本草枲耳一名葹一名地葵一名蒼耳一名常思菜陶隱居云一名羊負來者中國無此從外國羊毛中來圖經云其實多刺俗呼道人頭仁傑按沈約郊居賦云陸卉則紫鱉緑葹是也永嘉志一名兼絲艾户服艾以盈要兮謂幽蘭其不可佩王逸注艾白蒿也言楚國户服白蒿以為芬芳反謂幽蘭臭惡不可佩以言君愛昵讒佞憎逺忠直而不肯進也仁傑按王度記大夫鬯酒以蘭芝庶人以艾則蘭艾之分尚矣爾雅艾一名氷臺郭璞注即今蒿艾也逸以艾為白蒿按艾蒿與白蒿不同白蒿詩所謂蘩也詩有采蘩有采艾本草有白蒿條又别出艾葉條嘉祐圖經云艾初春布地生苗莖類蒿而葉皆白又云白蒿葉上有白毛從初生至枯白於衆蒿頗似細艾按蒿與白蒿相似耳便以艾為白蒿則誤矣茅蘭芷變而不芳兮荃蕙化而為茅五臣云茅惡草以喻讒臣仁傑按説文茅菅也爾雅藗一名壯茅郭璞云白茅屬邢昺云茅之不實者也本草茅根條云一名蘭根一名茄根一名地菅一名地筋一名兼杜陶隱居云此即今白茅詩云露彼菅茅其根如渣芹甜美嘉祐圖經云春生芽布地如針俗間謂之茅針亦可噉夏生白花茸茸然至秋而枯其根玉潔白又有菅亦茅類也陸璣草木疏云菅似茅而滑無毛根下五寸中有白粉者柔韌宜為索漚之尤善其未漚者名野菅詩白茅菅兮蕭何昔日之芳草兮今直為此蕭艾也洪慶善引顔師古云齊書太祖曰詩人采蕭蕭即艾也蕭自是香蒿古祭祀所用艾即今之灸病者名既不同本非一物詩云彼采蕭兮彼采艾兮是也淮南闕膏夏紫芝與蕭艾俱死蕭艾賤草以喻不肖仁傑按祭用鬯酒諸侯以薰大夫以蘭芝士以蕭庶人以艾謂蕭艾為賤草固有自來詩正義引爾雅蕭然李巡曰荻一名蕭陸璣云今人謂之荻蒿或謂之牛尾蒿似白蒿白葉莖粗科生多者數十莖可作燭有香氣故祭祀以脂爇之許叔重以為艾蒿非也郊特牲云既奠然後爇蕭注以為取蕭祭脂是也葛石磊磊兮葛蔓蔓王逸注言已欲服芝草求之不得但見葛草蔓蔓五臣云亦猶賢哲難逢諂諛者衆也仁傑按爾雅葛亦名雞齊一名鹿藿一名黃斤唐本注云葛根入土五六寸已上者名葛脰微有毒嘉祐圖經云春生苗引藤蔓長一二丈紫色葉頗似楸葉而青七月著花似豌豆花不結實根形如臂紫黑色下品有葛粉條即此也又有野葛蔓生出丹州以南葉似柿葉人食之即死嶺表録異云野葛毒草也俗呼胡蔓草通名鈎吻萹解萹薄與雜菜兮洪慶善引爾雅曰竹萹蓄注云似小梨赤莖節好生道傍本草云亦呼為萹竹萹薄謂萹蓄之成聚者按萹蓄雜菜皆非芳草此言解篇薄而備芳亦猶宿莽以為交佩也仁傑按郭璞注爾雅菉王芻及竹萹蓄皆引詩緑竹猗猗為證蓋毛公以緑為王芻竹為萹竹也陸璣草木疏云緑竹一草名其莖葉似竹青緑色髙數尺今淇澳傍生此人謂為緑竹孔頴達云此説非也詩有終朝采緑則緑與竹别草故傳依爾雅以王芻與萹竹異也按終朝采緑之緑固可指為王芻集韻菉或作􅀢云王芻也詩用緑字古文從省耳至竹字則有兩音萹竹之竹從敕六㔹冬生草之竹從張六切字同音異不可紊也淮南云淇衛箘簵漢書下淇園之竹故蘇黃門解緑竹詩云今淇上多竹王荆公詩義亦云虛而節直而和皆不用毛氏故訓惟離騷菉與萹則正爾用王芻萹竹二物也本草萹蓄條陶隱居云布地上花節間白葉細緑蜀本圖經云葉如竹莖細如叉股嘉祜圖經云葉似瞿麥根如蒿根薺故荼薺不同畝兮王逸注言忠佞不同朝也洪慶善云言荼苦薺甘故不同畝而生也爾雅蒫薺實也又菥蓂大薺郭璞注云葉細俗呼為老薺本草薺條云味甘陶隱居云薺類甚多此是今人可食者葉作菹羮亦佳陳士良云實可呼菥蓂又䓆蓂條云味辛唐本注引爾雅是大薺然驗其味甘而不辛也蜀本云似薺菜而葉細俗呼為老薺陳藏器云大薺即葶藶非䓆蓂也仁傑按爾雅蕇葶􅐗郭璞注實葉皆似芥廣雅云又云狗薺嘉祐圖經云葶藶初春生苗髙六七寸有似薺根白枝莖青三月開花微黃結角子扁小如黍粒微長黃色此草至夏則枯按月令孟夏之月靡草死鄭康成注云舊説靡草薺葶藶之屬淮南書云薺冬生夏死董仲舒雨雹對云建巳之月為純陽不容都無復隂也但陽氣之極耳薺麥枯由隂殺也建亥之月為純隂不容都無復陽也但隂氣之極耳薺麥始生由陽升也此説恐未然月令仲冬藝始生荔挺出皇氏云以其俱香草故應陽氣而出是月陽氣始萌故也若孟冬之月六隂用事薺特乘隂氣之盛而生耳非由陽升耳至孟夏六陽用事而薺枯焉是又陽極而然亦非隂殺之故若薺生於仲冬而枯於仲夏乃當如前説耳榝榝又欲充夫佩幃王逸注榝茱茰也似椒而非椒喻似賢而非賢也幃盛香之囊以喻親近洪慶善曰爾雅椒榝醜菜注云榝似茱茰而小赤色仁傑按本草吳茱茰一名藙陶隱居云禮記名藙而俗中呼為榝子當是不識藙字而呼以榝耳唐本注云爾雅椒屬亦有榝名陶誤也圖經云茱茰結實似椒子嫩時微黃至成熟則深紫爾雅釋草云無荑一名蔱蘠本草作􅀢塘蘇恭云字之誤也又釋木云無姑其實夷郭璞注無姑姑榆也取皮漬之所謂無荑也圖經無荑大氣臭按無荑雖氣臭有蔱名殊非椒類本草有蔓椒條一名豕椒一名豬椒一名彘椒一名狗椒陶隱居云山野處處有俗呼為椒似椒􅀢小不香爾一名柿椒按茱萸一名榝子蕪荑一名榝蘠蔓椒一名􅀢榝三者皆有椒名集韻草名或從草説文云似茱茰許叔重在王逸前故郭璞用許説為正顔師古急就章注亦云茱茰似椒而大則榝但似茱茰耳與茱茰非一物也蔓椒既有狶狗諸名又小不香為此物無疑今吳中謂之臭椒又謂之野椒是也博雅云柷榝檔越椒茱茰也合四物為茱茰尤非篁余處幽篁兮終不見天路險難兮獨後來五臣云篁竹叢言己不得見君讒邪蔽塞也洪慶善引漢書篁竹之中注云竹叢也竹田曰篁西都賦云篠簜敷衍編町成篁注篁竹墟名仁傑按爾雅竹有簜有莽有桃枝有鄰有簢有篠有箭戴凱之竹譜有筀有棘有箘簵有籦籠有􅀢􅀢有篃有雞脛廣志有攡竹􅓁竹􅀢竹雲母竹溪竹利竹永嘉譜有慈竹石竹綿筀竹茅竹菡􅥺竹雙竹亶竹慈孝竹粘翠竹苦油竹蘆栖竹大針竹一曰月竹公孫竹方竹紫竹江南竹斑竹湘江竹本草有䈽竹扁竹苦竹甘竹而篁竹在衆竹中最其下故見斥於離騷比之讒邪正以其叢薄幽昧蔽塞而巳唐劉寬夫有竹記其略曰有竹叢生日光不透隂氣來凝一庭常昏忘時失序病其蔽翳因命斤斧有質微而葉笨􅀢者芟之聚而曲者去之其獨立自持者保之去其邪者存其正者其説蓋祖離騷之遺意云離騷草木疏卷四
