body:
  text: 離騷草木疏後序仁傑少喜讀離騷文今老矣猶時時手之不但覧其昌辭正以其竭忠盡節凛然有國士之風每正冠歛衽如見其人凡芳草嘉木一經品題者謂皆可敬也因按爾雅神農書所載根莖花葉之相亂名實之異同悉本本元元分别部居次之於槧㑹萃成書區以别矣夫榝似椒蕭艾似􅀢與夫紫䕮之似蘭及巳之似杜蘅猶夫大佞之於忠鄉愿之於徳也得是書形見色屈或庶幾焉舉無以亂其真昔劉杳為草木疏二巻見於本傳其書今亡矣杳疏凡王逸所集者皆在焉而仁傑獨取諸二十篇之文故命曰離騷草木疏夫子不云乎詩可以興可以觀可以羣可以怨邇之事父遠之事君多識於鳥獸草木之名班固譏三閭怨恨懷王是未知離騷之近於詩而詩之可以怨也劉勰亦譏三閭鴆鳥媒娀女為迂怪詭異之說又王逸注鴆媒謂鴆食虵羽有毒可以殺人者按鴆有二焉瑶碧之山有鳥如雉其名曰鴆郭璞謂此更一種非食蛇者也離騷之文多怪怪奇奇亦非鑿空置辭實本之山經其言鷖鸞皇鴆鳥與詩麟騶鳯凰何異勰又何足以知之離騷以薌草為忠正蕕草為小人蓀芙蓉以下凡四十有四種猶青史忠義獨行之有全傳也薋菉葹之類十一種傅著巻末猶佞倖姦臣傳也彼既不能流芳後世姑使之遺臭萬載云歲在慶元丁已四月三日通直郎行國子録河南吳仁傑書
