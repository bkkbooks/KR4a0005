body:
  text: 離騷草木疏卷二宋吳仁傑撰荼故荼薺不同畝兮王逸注荼薺不同畝而俱生以言忠侫亦不同朝而俱用也爾雅荼苦菜邢昺疏菜味苦而可食者也本草苦菜一名荼菜一名選一名遊冬生益州凌冬不死桐君録云三月生扶疏六月花從葉出莖真黃八月實黑實落根長生冬不枯陶隱居云今茗極似此疑即是茗一名荼又令人不眠亦凌冬不雕而嫌其止生益州益州乃有其菜正是苦􅀢耳又巴東間别有真荼火煏作卷結亦令人不眠恐或是此又白英條一名榖菜陶云益州有苦菜土人專食之皆壯健無病疑或是此唐本注引詩云誰謂荼苦又堇荼如飴皆苦菜異名也陶謂之茗茗乃木類殊非菜流爾雅釋草云荼苦菜釋木云檟苦荼二物全别又顔氏家訓按易通卦驗元圖曰苦菜生于寒秋經冬歷春夏乃得成葉似苦苜而細斷之有白汁花黃似菊此則與桐君略同所在有之苦􅀢乃龍葵耳俗亦名苦菜非荼也蜀本圖經云春花夏實至秋復生花而不實陳藏器云苦􅀢葉極似龍葵但龍葵子無殼苦􅀢子有殼蘇云是龍葵其考據誤也人亦呼為小苦㲨顔師古刋謬正俗云苦菜主療諸病功力甚多茗草豈有此效桐君所說正得體狀今吳蜀謂苦菜者即爾雅所謂􅀢黃蒢耳仁傑按詩采苦正義曰此荼也陸璣云苦菜生山田及澤中得霜味脆而美所謂堇荼如飴者按此菜諸家之說不一謂味似苦苣者是也陶所云苦􅀢蓋苦參别名顔所云􅀢葉似酸漿江東以作葅食者􅀢與堇不同又本草唐本别出茗苦􅀢條爾雅荼檟二釋此以荼與薺合言之則荼薺皆當為草東坡詩周詩記苦荼茗飲出近世似亦誤指荼為苦荼耳夏小正四月取荼以為君薦蓋荼薺所以異者荼始苦而終甘薺則初食便甘又孟夏當陽長陰消之極而是月苦菜秀薺麥枯則知荼陽物也薺隂物也是又不同畝而俱生之義又爾雅委葉味辛且苦亦謂之荼周頌以薅荼蓼荼蓼即委葉也蘇鶚演義云紫葉者為香荼青葉者為青荼又茅搜亦謂之荼詩有女如荼國語望之如荼皆與此名同體殊也孫氏齊民要術音義云苣今葉皺而圓者謂之苦􅀢葉長而光者謂之生菜畦種之甘脆勝野生者薜荔薜荔柏兮蕙綢王逸注薜荔香草柏插壁也言已居家以薜荔搏飾四壁以香潔自修飾也罔薜荔兮為帷言已為帷帳也貫薜荔之落蘂逸注貫纍此香草執持忠正也五臣云貫拾也仁傑按山海經小華之山其草萆荔狀如烏韭而生石上亦緣木而生郭璞注萆荔香草也蔽戻兩音本草有絡石嘉祐圖經云今在處有之僧寺及人家亭圃山石間種以為飾葉圓細如橘正青冬夏不雕其莖蔓延節青處即生根鬚包絡石上以此得名花白子黑薜荔木蓮地錦石血皆其類也薜荔與此極相類但莖葉粗大如藤狀木蓮更大如絡蓮房地錦葉如鴨掌蔓著地上隨節有根石血極與絡石相類但葉頭尖而色赤又藥性論云土鼓藤小兒取于地打作鼓聲李雍名為常春藤日華子云常春藤一名龍鱗薜荔或以揚雄反騷言卷薜芷與若蕙漢書房中歌言都荔遂芳疑薜與荔本二物故爾雅有薜山蘄而山海經有萆荔萆字與薜音義不同按離騷云令薜荔以為理兮憚舉趾而緣木則薜荔固一物耳廣雅以山蘄為當歸非緣木而生者也女蘿被薜荔而帶女蘿王逸注女蘿菟絲也爾雅唐䝉女蘿女蘿莵絲又䝉王女邢昺疏唐也蒙也女蘿也莵絲也玉女也一物五名詩蔦與女蘿施于松柏毛傳云女蘿菟絲松蘿也本草松蘿一名女蘿陶隱居云東山甚多生雜木上而以松上者為真此外又出兔絲子條云一名兔蘆一名唐䝉一名玉女一名赤網一名兔虆蔓延草木上陶隱居云田野墟落中甚多皆浮生草苧麻蒿上舊言下有茯苓上有兔絲今不必爾抱朴所云兔絲初生根形如兔又云兔絲之草下有伏兔之根無此根則絲不得生于上然實不屬也日華子云莵絲苗莖似黃麻線多附田中草被纒死或生一叢如席草開花結子不分明如碎黍米粘顔師古急就章注云黃而細者為兔絲粗而色淺者為兔蘆仁傑按爾雅以女蘿為一物本草以為二物古詩與君為新婚免絲附女蘿白居易詩君為女蘿草妾作兔絲華二詩皆用本草之說秦少遊詩女蘿覆石蔓黃華按松蘿正青兔絲黃而有華則少遊即以兔絲為女蘿自用爾雅詩傳之說耳淮南子云下有茯苓上有兔絲許氏注云茯苓千歲松脂也兔絲生其上而無根一名女蘿陸璣云今兔絲蔓連草上生黃赤如金今藥兔絲子是也非松蘿松蘿自蔓生松上枝正青與兔絲殊異則許氏陸璣之說又相背馳按茯苓兔絲皆出于松則松蘿一名菟絲王逸之說為是若藍苧麻蒿上所生疑自是一種如杜若與杜蘅也山海經姑媱之山帝女化為莖草其葉胥成其華黃其實如菟丘郭注菟丘菟絲也則菟絲又謂之菟丘矣菌雜申椒與菌桂王逸注菌蕙也葉曰蕙根曰薰洪慶善曰博雅云菌薰也其葉謂之蕙則菌與蕙一種也下文别言蕙茝又云矯菌桂以紉蕙則菌桂自是一物本草有菌桂正圓如竹菌一作箘其字從竹仁傑按山海經有桂山榣山郭璞注山多桂及榣木因名云爾又有衡山菌山桂山郭云菌音芝菌之菌又云衡山有菌桂桂圓似竹見本草按菌與桂為兩物如桂與榣也山海經孟子之山其草多菌蒲蓋桂之似竹者曰菌桂其字從竹菌蒲之菌其字從草渠可强牽合而一哉陳藏器云本草菌桂字本作筒故方有筒桂後人誤書為菌九歎云菀蘼蕪與菌若九懷云菌閣兮蕙樓皆以菌蕙為一物七諫云飲菌若之朝露兮結桂木而為室又以菌與桂上下句分使逸以為薰草良是然不當以葉為蕙郭璞注山海經蓇蓉葉如蕙云蕙香草蘭屬或以蕙為薰葉失之蓋謂是也山海經浮山有草曰薰草麻葉而方莖赤華而黑實其臭如蘼蕪今按本草薰草一名蕙草陶隱居云俗呼燕草狀如茅而香者為薰草陳藏器云蕙即蕙根一名燕草又香蒲條陶隱居云是薰草又云是燕麥然香蒲不作麻葉唐本云薰草不載為藥録云薰草葉如麻兩兩相對按本草别出零陵香條云生零陵山谷葉如羅勒南越志名燕草又名薰草引山海經薰草云即零陵香也圖經云生下濕地常以七月中旬開花至香古方但用薰草而不用零陵香蓋山海經所謂菌與薰草離騷經所謂菌皆此物也雖一名蕙草諸家或以根或以葉為之其實不然本草别有蕙實正如杜若一名杜蘅而别有杜蘅不相似也本草當合薰草零陵香為一條而蕙實自為一條可也沈存中云蕙即零陵香蓋循陳藏器之誤耳王度記云諸侯鬯酒以薰大夫以蘭芝則薰草之貴在蘭之上茹攬茹蕙以掩涕兮王逸注茹柔耎也五臣云茹臭也蕙香草以喻忠正洪慶善云玉篇茹柔也一曰草茹五臣以茹為香誤矣吕氏春秋曰以茹驅蠅蠅至而不可驅則茹之又為臭販之名非香也周少隱云茹之為食也詩曰柔則茹之崔駰達㫖辭曰或木茹而長饑與上古未有火化飲血茹毛則茹為食明矣此言茹蕙猶言食秋菊耳蕙可茹蘭可食皆取其中心懷服忠正如嗜草木之芳香也曰攬茹蕙以淹涕者言攬所茹之蕙傷已中心嗜好惟盛德之馨香而不見知於時也仁傑按茹香草名也本草名柴胡一名地薰一名山菜其葉名藝蒿辛香可食吕氏春秋云菜之美者陽華之藝淮南子云草可以死復生陶隱居云今出近道如前胡而强倉頡解詁云藝蒿春秋有白蒻長四寸圖經云二月生苗甚香莖青紫葉似竹葉稍紫亦有似邪蒿亦有似麥門冬而短七月開黃花根赤色蘆頭有赤毛如鼠尾月令仲冬之月藝始生皇氏云應陽氣而出雜禮圖云藝蒿也葉似邪蒿夏小正十二月采藝為廟采也顔師古急就章注云藝蒿生熟皆可啖沈存中云中人藏書用藝今人謂之七里香者是也葉類豌豆作小叢生其葉極芬香葉間微白如粉汚辟蠧殊驗南人採置席下能去蚤蝨曽得數株于文潞公家移植祕閣按存中所云與本草小異爾雅疏云權一名黃華郭注云今謂牛藝草為黃華葉似苜蓿說文亦云藝草也似苜蓿然則牛藝云者亦藝類郭以時驗而言之存中之言殆此類耳紫蓀壁兮紫壇王逸注紫貝為室壇仁傑按山海經闞澤多茈羸注紫色螺也固可用紫貝解然與上下文所云荷室椒堂桂棟蘭橑藥房蕙槾不類九歌魚鱗屋兮龍堂紫貝闕兮珠宫于此用紫貝則宜紫壇之紫蓋紫草也山海經勞山多茈草注云一名茈戾中染紫爾雅藐一名茈草根可以染紫說文茈草也將此切本草紫草條云一名紫丹一名紫芙苗似蘭香莖赤節青二月有花紫白色秋實白生碭山及楚地紫石花條云紫一作茈古紫茈通文苑作紫貝闕兮珠宫今本作朱王逸云朱丹其宫恐當以珠字為正賈思協云種紫宜軟良之地沙地亦善性耐水必須髙田三月種九月刈華華采兮若英仁傑按上下文浴蘭湯兮沐芳華采衣兮若英蘭也芳也華也若也四者皆香草洪慶善以芳為白芷固當至以華采為五色采則因王逸誤而莫之能正山海經單狐之山多華草漨水出焉爾雅葭一名華說文葭葦之未秀者詩葭菼揭揭正義引爾雅葭蘆菼薍云大車傳以菼為蘆之初生則毛意以葭菼為一陸璣云薍或謂之荻以今語驗之則蘆薍别草也蘆葦之初生其名為葭稍大為蘆長成乃名葦耳本草蘆根條其花名蓬嘉祐圖經云其狀似竹而葉抱莖生無枝花白作穗若茅花根亦若竹根而節疏爾雅蘆為葭華郭璞云蘆葦也謂葭為薕似萑而細髙數尺江東人呼為薕謂葭為薍似葦而小實中江東呼為烏蓲其華皆名葭所謂蘆葦通一物也蒹今作薕者是也菼今以薪㸑者是也今人罕能别蒹葭與蘆葦又北人以葦與蘆為二物水傍下濕所生者皆為葦甚細而長指人家池圃所植者為蘆其幹差大深碧色者謂之碧蘆亦難得其笋味小苦堪食集韻采與彩通文色也詩蒹葭蒼蒼言其色之青華為蘆之未秀蓋尤青嫩之時西京雜記太液池邉皆是雕胡紫蘀之類長安人謂葭蘆之未解葉者為紫蘀云苽設苽梁只王逸注苽梁蔣實謂雕胡也言有苽梁之飯芬香且柔滑也仁傑按本草菰根注云蔣草也江南人呼為茭草蜀本圖經云生水中葉似蔗荻久根盤厚夏月生菌堪噉名菰菜三年已上心中生臺如藕白軟中有黑脉亦堪噉名菰梁也陳藏器云菰菜雜鯽魚為羮解酒毒生江東地澤菰葑上吕氏春秋云菜之美者越路之菌是也晉張翰見秋風起思之菰首生菰蔣草心至秋如小兒臂更有一種小者擘肉如墨名烏鬱人亦食之嘉祐圖經云葉如蒲葦輩春生筆謂之茭白歲久者生臺如兒臂謂之菰手今云菰首非是爾雅出隧一名蘧蔬郭璞云似土菌正謂此也南方人謂蘭為菰亦緣此義其臺中黑者謂之茭鬱兩浙下澤處菰根結久則并土浮於水上謂之菰葑刈去其葉便可耕蒔其苗有莖梗者謂之菰蔣草至秋結實乃雕胡米也古人以為美饌今饑嵗人猶採以當糧西京雜記云太液池邉皆是雕胡紫蘀緑節蒲叢之類菰之有米者長安人謂之雕胡菰之有首者謂之緑節是也廣志云菰以作席涅于蒲賈思協炊菰米法云菰榖盛葦囊中搗瓷器為屑勿令作末納韋囊中令滿版土揉之取米一闕可用升半炊如稻米按髙誘注吕氏春秋云越簵之箘謂竹筍也與陳藏器所云意味頗差蓴膾苴蓴只王逸注苴蓴蘘荷也又九嘆蘘荷注蓴苴也洪慶善曰蓴普各匹沃二切或作蓴非是仁傑按說文蘘荷一名葍蒩博雅蓴苴蘘荷也集韻平聲蓴殊倫切水葵也通作蓴又入聲蓴字二切如上蘘荷也劉氏漢書刋誤論上林賦巴苴云苴蓴苴也此文云苴蓴者苴謂葍苴蓴謂水葵蓋二物也蘘荷自許叔重以前一名葍蒩至齊梁間猶呼覆葅覆葍音同俚俗訛耳逸作楚詞章句在說文後不知何緣以葍為蓴曹憲博雅乃在隋世遵用逸說而已就逸說言之蘘荷一名蓴苴而此以苴蓴為文蓴為水葵明矣本草蓴味甘三月至八月名絲蓴霜降以後至十二月名瑰蓴味苦澀取以為羮猶勝雜菜蜀本圖經云生水中葉似鳬葵浮水上採莖堪噉花黃白子紫色莖細如叉賈思協種蓴法云近陂湖者可于湖中種之近流水者可決水為池種之水深則莖肥而葉少淺則葉多而莖瘦性易生不耐汚糞穢入池即死又有石蓴生南海石上南越志云似紫菜色青蘋白蘋兮騁望與佳期兮夕張五臣云以喻張設忠正以待君命又烏萃乎蘋中仁傑按集韻薲或作蘋大荇也山海經崑崙之丘有草曰薲其狀如葵其味如葱吕氏春秋曰菜之美者崑崙之薲爾雅蘋一名萍其大者蘋注水中浮萍江東謂之薸本草水薸條陳藏器云水萍有三種大者曰萍葉圓闊寸許葉下有一㸃如水沫一名芣菜陸璣草木疏云其粗大者謂之蘋季春始生可糝蒸為茹蘇恭云大曰蘋中曰荇菜即鳬葵也小者浮萍生溝渠間丘光庭云湖州圖經謂為不滑蓴謬矣爾雅蘋大萍左傳蘋蘩蕰藻之菜然則蘋為萍類根不植泥生于水上今之呼為浮萍者是也此文今本作白蘋者非是蘋蘩蕰藻之菜孔頴達云蕰藂也蕰藂生故謂之聚藻按蕰音溫自是一種水草今浙西之人謂之蕰草取以糞田者是也集韻平聲蕰烏昆切蕰水草也宋玉風賦起于青萍之末此云白蘋者丘光庭謂入夏有花其花正白故云或曰蘋花夏生而栁惲詩云汀洲採白蘋日莫江南春何也曰以此花色白故花時亦可呼為白蘋也蒿吳酸蒿蔞王逸注蒿蘩草也爾雅藩皤蒿邢昺疏云皤猶白也詩于以采蘩于沼于沚孔頴達正義引孫炎曰白蒿也然則非水菜言沼沚者謂于其傍采之也本草唐本白蒿注云此蒿葉粗于青蒿從初生至枯白于衆蒿欲似艾者所在有之又云葉似艾上有白毛粗澀俗蓬蒿掌禹錫云蓬蒿可以為葅故詩箋云以豆薦蘩葅陸璣云凡艾白色為皤蒿今白蒿春始生及秋香美可生食又可蒸一名闕胡北海人謂之旁勃故大戴禮夏小正傳曰蘩遊胡旁勃也孟詵云春初蒿最先諸草而生苴膾苴蓴只王逸注蓴苴蘘荷也仁傑按說文蘘荷一名葍蒩本草有白蘘荷陶隱居云今人呼赤者為蘘荷白者為覆葅同一種耳藥用白者蠱中者服其汁并卧其葉即呼蠱主姓名亦主諸溪毒沙蝨輩人家種白者亦云辟蛇蜀本圖經云葉似初生甘蕉根似薑牙其葉冬枯嘉祐圖經云今荆襄江淮間多有之春初生其根堪為葅其性好陰在木下者尤美潘嶽閒居賦云蘘荷依隂時藿向陽是也史遊急就篇云蘘荷冬日藏荆楚嵗時記亦云仲冬蓋藏蘘以備冬儲干寶搜神記云蔣士先中蠱家人密以蘘荷置席下忽笑曰蠱我者張小也乃收小自此解蠱藥多用之周禮庶氏以嘉草除蠱宗凛謂嘉草即蘘是也赤者堪噉及作梅果用之蘇鶚演義云蘘荷似􅀢苴而白􅀢苴色紫花生根中花未散時可食久置則銷爛不為實矣賈思協曰蘘荷宜在樹隂下二月種之一種永生不須鉏微加糞以土覆其上八月初踏其苗令死不爾根不茂蔞吳酸蒿蔞王逸注蔞香草也爾雅購一名蔏蔞郭璞注蔏蔞蔞蒿也生下田初生可啖江東用羮魚詩翹翹錯薪言刈其蔞陸璣云其葉似艾白色長數寸好生水邉及澤中正月根牙生旁莖正白食之香而脆美其葉又可蒸為茹也薠薠蘅槁而節離王逸注薠草秋生今南方湖澤皆有之洪慶善云薠音煩淮南子云路無莎薠注云薠狀似葴上林賦薛莎青薠張楫曰青薠似莎生江湖雁所食南都賦草則藨苧薠莞李善引郭璞山海注云薠青薠似莎而大又七發掩青蘋遊清風蓋引吕氏春秋崑崙之蘋又引張楫子虛賦注曰青蘋似莎而大仁傑按山海經隂山其草多茆蕃郭璞注蕃音煩青蕃似莎而大蓋蕃即薠也薠蘋字相近易亂故白蘋兮騁望一作薠此薠蘅文亦或作蘋按莎草莖葉都似三稜生下田蘋葉似荇菜生水中與莎不類似莎者薠也七發注引用良誤鄭氏周禮巾車注棼蔽云棼讀為薠薠麻以為蔽則薠又為麻類胡索胡繩之􅀈􅀈王逸注香草言紉索胡繩令澤好以善自約世也仁傑按胡謂葷菜也爾雅蒚山蒜說文蒜葷菜也一云菜之美者雲夢之葷菜生山中名蒚本草葫味辛陶隱居云今人謂葫為大蒜謂蒜為小蒜以其氣類相似唐本注云此物煮為羮臛極俊美圖經云今處處有之人家園囿所蒔也每頭六七瓣初種一瓣當年便成獨子葫至明年則復其本矣其花中有實亦葫瓣狀而極小爾雅說文所謂蒜葷菜者乃今大蒜也蒚乃小蒜也陸法言切韻曰張騫使西域得大蒜誤矣江南有山蒜又有一種似大蒜而多瓣者有葷氣彼人謂之􅀢子江北則無夏小正云十有二月納卵蒜也者本如卵者也納者何納之君也蘇鶚演義云卵蒜俗謂之小蒜有十許子共一株二籜幕裹之名胡蒜尤辛又呼大蒜賈思協云蒜宜良軟地九月初種五寸一株二年科皆如拳蘇鶚云者二月揠之否則獨科而黃中旬鉏之三遍無草亦鉏三遍蓋古人虀臼用此洪慶善云胡繩謂草有莖葉可作繩索者按離騷如以蕙為綢杜蘅為繚皆借香草寓意云爾必曰莖葉可為繩索則其說拘矣繩索胡繩之纚纚王逸云繩香草而不能名其物仁傑按繩者繩毒也爾雅盱一名虺床郭璞注蛇床一名馬床廣雅云一名繩毒一名思益一名棗棘一名牆蘼本草一名蛇粟陶隱居云蛇床子近道田野間甚多花葉正似蘼蕪嘉祐圖經云似小葉芎藭花白子如黍粒黃白色三月生苗髙二三尺葉青碎作叢似蒿枝每枝上有花頭百餘結同一窠似馬芹類四五月開花又似散水芭傳芭兮代舞王逸注芭香草名也洪慶善曰巴且草一名芭蕉仁傑按集韻芭字云芭蕉草名本草有甘草蕉陶隱居云本出廣州今東間並有根葉無異惟子不堪食耳蜀本圖經云俗呼芭蕉名生江南葉長丈許闊二尺餘莖虛軟嘉祐圖經云今出二廣閩中川蜀者有花閩廣者實極美可噉他處雖多而作花者亦少近歲都下往往種之甚盛皆芭蕉也蕉類亦多甘蕉乃是有子者葉大抵與芭蕉相類但其卷心抽幹作花初生大蕚如倒垂菡萏有十數層層皆作瓣漸大則花出瓣中極繁盛紅者如火炬謂之紅蕉白者如蠟色謂之水蕉其花大類象牙故謂之牙蕉其實亦有青黃之别可曝乾寄逺北土得之以為珍果閩人灰埋其皮令錫滑績以為布藑茅索藑茅以筳篿王逸注藑茅靈也按爾雅釋草云葍藑茅仁傑按說文藑字解云茅葍也一名舜又舜字解云草也楚謂之葍秦謂之藑藑地連隂闕則藑茅又謂之舜矣詩顔如舜華陸璣以為木槿者按說文舜字之外别出蕣字解云木堇也古文省故詩即用舜為蕣木堇之舜與敻茅之舜不同也賈思協云葍一名蔓根幽冀謂之燕葍正白可蒸以禦饑漢祭甘泉用之其華有兩種一種莖葉細而香一種莖赤氣臭風土記曰葍蔓生被樹而生味甘一名甘獲夏統别傳注云獲葍也郭璞曰葍華有赤者為藑藑葍一種耳又注葍云大葉白華根如芷正白可啖邢昺釋藑茅云華白者即名葍王彥輔塵史云退之雪詩疑是屑瓊瑰瓊為赤玉此用之不審又晏元獻有揚州后土廟玉蘂花詩序云此花因王元之更名瓊花按李善文選注瓊赤玉也蓋王之誤晏公拒霜花詩用瓊房字紅蓼詩用瓊粒字正用此說仁傑按瓊與璿同有葵營旬宣二切詩報之以瓊琚毛公注云瓊玊之美者孔頴達曰瓊是玉之美名非玉名也書在璿璣孔安國注璿美玉說文于璿字亦云美玉也至瓊字乃云赤玉許叔重在毛公孔安國之後不知赤玉之說何所本郭氏爾雅注以藑為赤華亦並緣瓊玉之義耳按葍為白華其曰藑者秦楚方言之異非必赤華為瓊也推此則后土祠花亦固可以名瓊晏公所據李善文選蓋本說文之解如此詩言采其葍云惡菜也此云香草者始是賈思協所分兩種白香而赤臭郭氏言赤白花良是顧不當以赤為藑耳揭車畦留夷與揭車爾雅揭車䒗藇仁傑按山海經景山北望少澤多萆薯藇郭璞注根似羊蹄可食今江南單呼為薯音儲又劉氏漢書刋誤論上林論諸柘云諸山芋字當作薯集韻藇香草䒗藇然則薯為山芋藇為揭車本二物也本草拾遺云揭車味辛生彭城髙數尺白花留夷畦留夷與揭車王逸注留夷香草也洪慶善曰上林賦雜以留夷張楫曰留夷辛夷也顔師古曰留夷香草非辛夷辛夷乃木耳一云留夷藥名離騷草木疏卷二
