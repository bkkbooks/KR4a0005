body:
  text: 離騒草木疏巻三宋吳仁傑撰橘后皇嘉植橘徕服兮受命不遷生南國兮王逸註言橘生江南徙種北地則化而為枳屈原自比志志如橘亦不可移洪慶善引廣异志云橘為木白華赤實皮既馨香又有善味仁傑按山海經荆山多橘櫾櫾與柚同尚書厥包橘柚錫貢孔安國註小曰橘大曰柚本草橘柚條唐本註云柚皮味甘橘皮味辛而苦柚肉如橘有甘有酸酸者壺甘俗謂橙為柚非也吕氏春秋果之美者有雲夢之柚郭璞云柚似橙而大於橘橘柚皆為甘也陳藏器云橘柚類有朱柑乳柑黄柑石柑沙柑朱橘乳橘榻橘山橘黄淡子以乳柑為上永嘉譜又有沙橘緜橘荔枝橘穿橘油橘金橘自然橘凍橘狗橘朱欒香欒包橘蜜覃鄭康成說書厥包橘柚乃三物包音普膠切或云蜜覃是也又黄橘早黄橘緑橘嘉祐圖經云木髙一二丈葉與枳無辨刺出於莖間夏初生白花六月七月而成實至冬而黄熟可啖今醫方用黄橘青橘兩物不言柚豈青橘是柚之類乎然黄橘味辛青橘味苦今之青橘似黄橘而小與舊說大小苦辛不類别是一種耳又有一種拘櫞如小𤓰狀皮若橙而光澤可愛肉厚味短而香氛大勝甘橘置衣笥中則數日香不歇閩廣江西有之謂之香櫞沈存中云本草註橘皮味苦柚皮味甘此誤也柚皮極苦不可向口皮甘者乃橙耳陳藏器云舊說江南為橘江北為枳今江南俱有枳橘江北有枳無橘此自是種别非關變也仁傑按周官橘踰淮北為枳地氣使然又晏子曰橘生江北為枳水土異也今江北有枳無橘則其說驗矣陳氏之說恐未之思也張勃吳録建安郡有橘冬月於木上覆裹之至明年春夏色變青黒味絶美上林賦盧橘夏熟盧黒色也桂雜申椒與菌桂兮豈惟紉夫􅈍茝王逸註椒桂皆香木蕙茝皆香草以喻賢者洪慶善云言賢無大小皆在所用又云箘字從竹仁傑按本草有菌桂杜桂桂三種菌桂條云生交趾桂林山谷巖崖間無骨圓如竹陶隠居云仙經用菌桂三重者良唐本註云菌者竹名古方用筒桂者是葉中三道文理𦂳宻薄如竹蜀本圖經云葉似柿葉而尖狹光浄花白蘂黄四月開五月結實木皮青黄薄巻若筒者名筒桂厚硬味薄者名板桂又牡桂條陶隠居云今俗用牡桂狀似桂而扁薄皮色黄脂肉甚少氣如木蘭味亦類桂不知當是别木抑猶是桂之老宿者唐本註云古方用木桂或云牡桂即今木桂及單名桂者是也此桂花子與菌桂同惟根倍長蜀本圖經云葉狹長於箘桂一二倍嫩枝謂之桂枝又名肉桂削去上皮曰桂心其厚皮者名木桂又桂條陶隠居云湘州有小桂經云葉似栢葉澤黒皮黄心赤齊武帝時湘州送此木植之芳林苑中今東山有桂皮氣麤相類而葉乖異亦能凌冬恐或是牡桂時人多呼月桂正謂皮赤耳唐本註云菌桂表裏無毛而光澤牡桂葉長尺許陶云小桂或云其葉小者引經云似栢葉驗之殊不相類不知此言從何而出掌禹錫云按此有三種菌桂似柿葉牡桂似枇杷葉此云枇杷葉者陶仕齊為諸王侍讀得見此木而言也蘇恭但知有二種不能細尋事跡而云陶誤陳藏器云箘桂牡桂桂心同是一物皮厚者必嫩薄者必老嫩者辛香兼又筒巻老必味淡自然板薄板薄者即牡桂也筒巻者即箘也古方有筒桂字似箘字後人誤書之嘉祐圖經云牡桂去皮名桂心今所謂官桂也箘薄如竹大枝小枝皮俱是筒人家園圃亦有種者移植於嶺北則氣味殊少辛辣三月四月生花全類茱萸九月結實今人多以裝綴花果作筵具其葉甚香可用作飲中品又有天竺桂云生西胡國今亦稀有仁傑按爾雅梫一名木桂郭璞註南方呼桂厚皮者為木桂桂葉似枇杷而大白華華而不著子叢生巖嶺冬夏常青間無雜木邢昺云牡桂是也按箘桂得名正以其緊薄如竹故以箘簵之菌名之以别木桂厚皮者耳箘桂一名筒桂而木桂一名板桂筒不離竹板不離木大抵以竹言薄木言厚也雖箘筒字近寫易誤只用箘字其義亦明陳藏器厚嫩老薄之說正爾相反也小山招隠曰攀援桂枝兮聊淹留白樂天去杭日有别萱桂詩云桂有留人名謂此又至蘇有東城桂詩云子墮本從天竺寺根盤今在闔閭城自註云舊說杭天竺寺每嵗秋中有月桂子墮樂天所云桂意即今所謂木犀者又謂之巖桂故曽文清詩云團圓巖下桂表表木中犀是亦桂之别種然前輩多即以為桂蘇養直巖桂詩云已是小山来眼界是也惟蘭齋不然賞木犀花有武陵曽識最髙枝之句又長短句云三閭未識孤妍離騷遺恨千年豈欲三閭於桂之外别樹巖桂如蘭與石芥之比乎椒雜申椒與菌桂又步余馬於蘭臯兮馳椒丘且焉止息五臣云行息依蘭椒不忘芳香以自潔也仁傑按山海經琴鼓之山多椒柘郭璞註椒為木小而叢生下有萆本則蠚死爾雅檓大椒郭璞註云今椒木叢生實大者名為檓詩唐風云椒聊且陸璣疏云椒似茱萸有針刺葉堅而滑澤今成臯諸山間有椒謂之竹葉椒可著飲食中東海諸島上亦有椒枝葉皆相似子長而不圓甚香其味似橘皮本草有秦椒蜀椒兩種蜀椒一名巴椒一名唐藙唐本註云秦椒葉及莖子皆似蜀椒但味短實細掌禹錫云蜀椒出成都秦椒出天水隴西圖經云今南北所生一種椒其實大於蜀椒當以實大者為秦椒服食藥當用蜀椒蜀椒髙四五尺四月結子無花但生於葉間如小豆顆而圓皮紫赤色此椒及江淮北土皆有之但不及蜀中者皮肉厚氣味濃耳又施州有崖椒閩中江東有黨子淹藏作果品吳越春秋越以甘蜜圓欓報吳則黨之相贈尚矣山海經景山之草亦名秦椒郭註子似椒而細葉是也王逸註申椒云申重也其芳小重之乃香至九章露申辛夷死林薄兮亦以申為重按申當作柛爾雅木自斃曰柛此與申椒義不同賈思勰云椒於二三月移之先作熟穰泥掘出即泥封根埋之又熟時收取黒子四月初畦種之方三寸一子篩土盖其上常澆令潤生髙數寸連雨時移之性不耐寒若陽中之樹冬須草裹不裹即死其生隂中者少禀寒氣則不用裹一木之性寒暑異質所謂習與性成者離騷於椒不能無感亦以此歟松飲石泉兮䕃松栢王逸註言己雖在山中猶飲石泉䕃松栢飲食居處動以香潔自修飾也五臣云飲清潔之水䕃堅實之木仁傑按山海經錢来之山多松本草松節條陶隠居云比来苦脚弱人釀松節酒皆愈松柏皆有脂潤又凌冬不彫理為佳物但人多忽近易之耳唐本註云松上緑衣名艾蒳蕭炳云有五葉者一叢五葉如釵名五粒松嘉祐圖經云今松實作果品其花上黄粉名松黄山人及時拂取作湯甚佳但不堪寄逺五粒字當讀為鬣音之誤也言每五鬣一葉或有兩鬣三鬣者松久則實繁中原雖有然不及塞上者佳崔寔曰正月自朔暨晦可移植松柏雜木髙麗圖經云廣錫永三州多大松惟五葉者乃結實羅州道亦有之不若三州之富始生謂之松房狀如木𤓰青潤緻宻得霜乃拆其實始成而房乃作紫色俗雖果肴羮餅亦用之不可多食令人嘔不已又取松之柔條細削成縷搥壓成綫織而為扇上有花紋不減穿藤之巧又有杉扇惟以白杉木劈削如紙貫以采組相比如羽亦可招風柏飲石泉兮䕃松柏仁傑按山海經丹熏之山其上多柏爾雅柏一名椈本草柏實條陶隠居云柏葉實亦為服餌所重唐本註云枝節煮以釀酒主風痺蜀本圖經云此用偏葉者今所在皆有嘉祐圖經云三月開花九月結子其葉名側柏出宻州者佳雖與他相類而其葉皆側向而生道家靈作柏葉湯古柏葉尤竒今益州諸葛孔明廟中大柏木相傳是蜀世所植人多採服其味甘香於常柏也辛夷辛夷楣兮葯房按本草辛夷一名辛矧一名侯桃一名木房陶隠居云今出丹陽近道形如桃子小時氣辛香即離騷所呼辛夷者陳藏器云此花江南地暖正月開北地寒二月開初發如筆北人呼為木筆花其花最早南人呼為迎春掌禹錫按蜀本圖經云木髙數仞葉似柿葉而狹長花色白而帶紫花落而無子夏杪復著花如小筆又有一種三月花開四月花落子赤似相子花葉與無子者同今苑中有一本髙三四丈花葉一如圖經所説身徑二尺許去根三尺已来便有枝柯繁茂可愛花落復生葉至夏初還生花經秋歴冬葉落花漸大如有毛小桃至来年正月二月始開花是興元府進来經二十餘載方結實以此推之即是年嵗淺者無子非有二種也開花早晩亦隨南北節氣寒温耳王逸此文註云辛夷香草以作户楣洪慶善云辛夷木大連合抱逸云香草非也又上林賦雜以留夷張楫曰留夷新夷也顔師古曰留夷香草也新夷乃木耳甘泉賦列新雉於林薄服䖍曰新雉香草也雉夷聲相近顔師古曰新雉即新夷耳為木甚大非香草也其木枝葉皆芳仁傑按韓退之詩辛夷花髙最先開辛夷固木名諸家謂之香草盖亦有說山海經繡山其草多芍藥郭璞註云芍藥一名辛夷此與逸說相符第本草芍藥一名白术一名餘容一名犁食一名解倉一名鋋不著辛夷之名不知郭本於何書又芍藥毛氏以為香草陸璣疏乃云今芍藥無香氣非是也未審今何草按日華子云芍藥便是芍藥花根今芍藥花亞於牡丹又牡丹亦謂之木芍藥二花不可謂無香氣陸氏之說殊不可曉本草又出新雉木條疑甘泉賦所謂新雉自是一種非辛夷也木蘭朝搴阰之木蘭王逸註木蘭去皮不死以喻讒人困己己受天性不可變也仁傑按本草木蘭一名林蘭一名杜蘭皮似桂而香生零陵山谷陶隠居云狀如楠皮甚薄而味辛香今益州有之皮厚狀如厚朴而氣味為勝唐本註云似箘桂葉其葉氣味辛香不及桂也蜀本圖經云木髙數仞似箘桂葉有三道縱文皮如板桂有縱横文嘉祐圖經云此與桂枝全别而韶州所生乃云與桂同是一種取外皮為木蘭中肉為桂心盖是桂之一種耳任昉述異記云木蘭川尋陽江中多木蘭又七里洲中有魯班刻木蘭舟至今在洲中今詩家云木蘭舟出於此王彦賔云離騷九歌言蕙蘭石蘭椒蘭幽蘭出草也惟蘭橑蘭栧為木蘭謂以此木為欀及柂也按騷人寓意香草以為屋室舟楫之飾耳如蓀橈葯房荷屋之類皆用此意不可拘酉陽雜俎云木中一嵗再發花者惟木蘭為然今按木蘭四時著花又有四月著花者謂之夏木蘭雜俎恐誤莽夕攬洲之宿莽仁傑按山海經朝歌之山有莽草焉可以毒魚郭璞云今用之殺魚又葌山有木焉其狀如裳而赤葉名曰芒草可以毒魚爾雅葞春草郭璞註引本草云一名芒草按本草莽草一名葞一名春草陶隠居云今東間處處皆有葉青辛烈者良人用𢷬以和米内水中魚吞即浮出人取食之無妨莽字一作菵字今俗呼菵草也掌禹錫云今呼菵草郭云芒草所見本異也圖經云木若石楠而葉稀無花實一說藤生繞木石開古方皆用菵草今醫家取其葉用之甚效此木也而爾雅釋草云春草釋藥曰莽草也郭璞云一名芒草芒菵音近故爾然謂之草者乃蔓生者是也按郭以莽為芒者正以山海經有莽草芒草皆可毒魚故通之耳此正陶隠居所云用以取魚與山海經合三閭所稱草木多出於山海經此為莽草無疑王逸不見山海經以意言之云草冬生不死者楚人名曰宿莽非也然逸初不指名為巻施草其後郭璞註爾雅巻施草拔心不死乃引離騷云宿莽也是說盖祖於逸所謂冬生不死者其實逸說亦自無所本楸望長楸而太息王逸註長楸大梓言已顧望楚都大梓木而悲歎仁傑按山海經虖勺之山其上多梓又堇理之山多美梓郭璞註云山楸也又陽華之山多苦莘其狀如橚郭註橚即楸字也爾雅小葉曰榎大而皵楸郭註楸細葉者為榎樊光云木老而皮麤皵者為楸木少而皮麤皵者為榎又椅梓註云即楸也又楰䑕梓註云楸屬也陸璣云其枝葉木理如楸山楸之異者今謂之苦楸本草梓白皮條蕭炳云木似桐而葉小花紫日華子云梓皮有數種惟楸梓佳圖經云䑕李一名䑕梓然䑕李花實都不相類恐别一物而名同也梓之入藥當用有子者楸梓官寺及人家園亭多植之賈思勰云楸梓二本相類白色有角生子者為梓或名子楸或名色楸黄色無子者為栁楸亦呼荆黄楸也楸既無子可於大樹四面掘坑取栽移之兩步一根兩畝一行也韻語陽秋色香韻勝見於杜子美梅聖俞詩要把楸花媚逺天言其色也楸木馨香倚釣磯言其香也紫盖青幢木聳向白玉墀髙艷不近俗直許天人窺言其韻也义採其葉傅瘡立愈云黄棘借光景以徃来兮施黄棘之枉䇿王逸註黄􅁄棘刺也言願借神光電景飛注徃来施棘之刺以為馬䇿言其急疾也洪慶善曰言己之所以假延日月徃来天地之間無以自處者以其施黄􅁄之枉䇿故也初懐王二十五年與秦盟於黄棘其後為秦所欺卒客於秦今頃襄任用姦回將至亡國是施黄􅁄之枉策也黄棘地名仁傑按借光景以徃来猶離騷經聊假日以媮樂逸註云神光電景非是又以黄棘為棘刺而不知所據今按山海經苦山有木焉黄華而圓葉其實如蘭離騷草木多用山海經九章盖取諸此地名之説誤也本草木部有赤􅁄白棘唐本註引切韻曰􅁄小棗也花葉莖實俱類􅀥嘉祐圖經云枸杞一名仙人杖而枸杞有針者一名枸􅁄今此所名黄棘以花黄得名又其實如蘭則用為馬䇿者特取其香耳不以刺為嫌也惟椒亦然離騷草木疏巻三
